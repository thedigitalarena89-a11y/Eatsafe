<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .ambient-shadow {
      shadow: 0 8px 24px rgba(26, 28, 31, 0.06);
    }
    body {
      background-color: #f9f9fe;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body text-on-surface-variant min-h-screen flex flex-col">
<!-- Shell Suppression: Login/Register screens exclude TopAppBar and BottomNavBar per "Destination Rule" -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-[440px] bg-surface-container-lowest rounded-2xl p-8 md:p-12 shadow-[0_8px_24px_rgba(26,28,31,0.06)]">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-full mb-6 shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-3xl" data-icon="scale">scale</span>
</div>
<h1 class="font-headline font-black text-primary text-2xl tracking-tight mb-2">Smart Food Weight Tracker</h1>
<p class="font-body text-on-surface-variant text-sm">Welcome back to The Living Ledger</p>
</div>
<!-- Social Login -->
<div class="mb-8">
<button class="w-full h-14 bg-surface-container-lowest outline outline-1 outline-outline-variant/30 flex items-center justify-center gap-3 rounded-full hover:bg-surface-container-low transition-colors duration-200">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google multi-colored logo icon on a transparent background for social authentication" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBkMs3ttetoGKZn4IES8RNi3p1A2fEDPslPnOoH5hzaAECL6bqV4q-3U9DEsKun6VKYDgg8AODpKmtNeAJaKwX7gT2HkcriQ0zD8abaZvaMr4GgHAp2CDEts4y9UIuPCRxm9aNf6vNrh4wwzymKnOeywHSoFxAJMip-yItHZv3TTrCuUZIsss0iu4qSUigvz4olli1ONFaFVhBtBxVWIsxOzQlTAiB0H7PbuVk15zcAimZ2WGJvbvSwIMtV9eeJikDGECn-2Z7enL_"/>
<span class="font-body font-semibold text-on-surface text-sm">Continue with Google</span>
</button>
</div>
<div class="relative flex items-center gap-4 mb-8">
<div class="flex-grow h-px bg-outline-variant/20"></div>
<span class="font-label text-[10px] font-bold text-outline uppercase tracking-widest">or email</span>
<div class="flex-grow h-px bg-outline-variant/20"></div>
</div>
<!-- Login Form -->
<form class="space-y-6">
<div class="space-y-1.5">
<label class="font-label text-xs font-bold text-on-surface-variant ml-4 uppercase tracking-wider" for="email">Email Address</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-5 text-on-surface font-body text-sm placeholder:text-outline focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all" id="email" placeholder="name@example.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline text-xl opacity-0 group-focus-within:opacity-100 transition-opacity" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-4">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label text-[10px] font-bold text-secondary hover:opacity-80 transition-opacity uppercase tracking-wider" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-5 text-on-surface font-body text-sm placeholder:text-outline focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline text-xl opacity-0 group-focus-within:opacity-100 transition-opacity" data-icon="lock_open">lock_open</span>
</div>
</div>
<div class="pt-2">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary font-body font-bold rounded-full shadow-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
            Login to Dashboard
          </button>
</div>
</form>
<!-- Registration Entry -->
<div class="mt-10 text-center">
<p class="font-body text-sm text-on-surface-variant">
          New to the tracker? 
          <a class="font-bold text-primary hover:underline ml-1" href="#">Create an account</a>
</p>
</div>
</div>
</main>
<!-- Decorative Graphic Element (Editorial Asymmetry) -->
<div class="fixed top-0 right-0 w-1/3 h-full -z-10 overflow-hidden pointer-events-none opacity-40">
<div class="absolute -top-20 -right-20 w-[600px] h-[600px] bg-primary-fixed-dim/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-0 w-[400px] h-[400px] bg-secondary/10 rounded-full blur-[100px]"></div>
</div>
<footer class="py-8 text-center">
<div class="flex justify-center gap-6 mb-4">
<a class="text-[10px] font-bold uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Privacy</a>
<a class="text-[10px] font-bold uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Terms</a>
<a class="text-[10px] font-bold uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Support</a>
</div>
<p class="font-label text-[10px] text-outline opacity-60">© 2024 Smart Food Weight Tracker. Precision Nutrition.</p>
</footer>
</body></html>
