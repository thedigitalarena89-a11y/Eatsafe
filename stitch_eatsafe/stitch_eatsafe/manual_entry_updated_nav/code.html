<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary-container": "#004d0f",
            "on-error": "#ffffff",
            "on-primary": "#ffffff",
            "secondary-fixed": "#e2dfff",
            "primary": "#006e1a",
            "surface-container": "#ededf2",
            "surface-container-high": "#e8e8ed",
            "surface-dim": "#d9dade",
            "error-container": "#ffdad6",
            "on-surface-variant": "#3d4a3c",
            "inverse-primary": "#46e354",
            "on-tertiary-fixed": "#410004",
            "surface-variant": "#e2e2e7",
            "surface-container-highest": "#e2e2e7",
            "primary-fixed-dim": "#46e354",
            "on-tertiary-container": "#772523",
            "tertiary": "#9c413d",
            "secondary": "#4c4aca",
            "surface-container-lowest": "#ffffff",
            "inverse-on-surface": "#f0f0f5",
            "tertiary-container": "#ff8e86",
            "on-secondary": "#ffffff",
            "outline": "#6d7b6b",
            "on-primary-fixed": "#002203",
            "on-tertiary-fixed-variant": "#7e2a27",
            "on-secondary-fixed": "#0c006a",
            "error": "#ba1a1a",
            "on-primary-fixed-variant": "#005311",
            "surface": "#f9f9fe",
            "on-error-container": "#93000a",
            "inverse-surface": "#2e3034",
            "on-background": "#1a1c1f",
            "tertiary-fixed": "#ffdad7",
            "surface-container-low": "#f3f3f8",
            "background": "#f9f9fe",
            "secondary-container": "#6664e4",
            "primary-container": "#20c93d",
            "surface-bright": "#f9f9fe",
            "on-secondary-container": "#fffbff",
            "on-tertiary": "#ffffff",
            "on-secondary-fixed-variant": "#3631b4",
            "surface-tint": "#006e1a",
            "tertiary-fixed-dim": "#ffb3ad",
            "on-surface": "#1a1c1f",
            "primary-fixed": "#71ff74",
            "secondary-fixed-dim": "#c2c1ff",
            "outline-variant": "#bccbb8"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1.25rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .custom-ambient-shadow {
      box-shadow: 0 8px 24px rgba(26, 28, 31, 0.06);
    }
    input:focus {
      outline: none;
      box-shadow: none;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface-variant min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#f9f9fe] dark:bg-slate-950 flex items-center justify-between px-6 py-4 w-full sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#f3f3f8] dark:hover:bg-slate-800 transition-transform duration-200 active:scale-95 text-[#006e1a]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline text-xl font-bold text-[#1a1c1f]">Manual Entry</h1>
</div>
<div class="font-headline font-extrabold text-[#006e1a] dark:text-[#20c93d]">The Living Ledger</div>
</header>
<main class="max-w-xl mx-auto px-6 pt-8">
<!-- Hero Decoration / Context -->
<div class="mb-10 relative overflow-hidden rounded-2xl aspect-[21/9] bg-primary-container/10 flex items-center px-8">
<div class="relative z-10">
<h2 class="font-headline text-2xl text-on-primary-container leading-tight">Log your <br/><span class="text-primary">daily intake</span></h2>
</div>
<div class="absolute -right-4 bottom-0 w-40 h-40 opacity-20">
<img alt="Decorative icon" class="w-full h-full object-contain" data-alt="Stylized transparent illustration of a fresh salad bowl with green leaves and tomatoes in a soft organic style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCU-d6NqCqpkeoAwbCX-Sjgq4SPCgQE1loRKUAWXDqmwhU0vh_F4OZcYjEHS7t3bNl0W08RkwG1_zcSFUuQ0jPF-86ZN-JkDddZ_lrVXROjTG6P_Ri8Trjk-DgbCBFPfWnv1k_CW6zHM1iP6v0JZXlNRDJ5cOQdvxcN43a_pSLpinvy6t47GWaRefRDrKfB1T1WHj_mLMYzxhz--DTLxwJyvvYGEOy_Qp1zx6IKmu-4WDlM8ph9_lTYS82D2lkbJI2n4kbefm-sa-GQ"/>
</div>
</div>
<!-- Entry Form -->
<div class="space-y-6">
<!-- Food Name -->
<div class="group">
<label class="block text-xs font-semibold uppercase tracking-wider mb-2 ml-1 text-outline">Food Name</label>
<div class="bg-surface-container-low rounded-2xl px-5 py-3 transition-all duration-200 group-within:bg-surface-container-lowest group-within:ring-2 group-within:ring-primary/40">
<input class="w-full bg-transparent border-none p-0 text-on-surface font-medium placeholder:text-outline/50 focus:ring-0" placeholder="e.g. Avocado Toast" type="text"/>
</div>
</div>
<!-- Measured Weight -->
<div>
<label class="block text-xs font-semibold uppercase tracking-wider mb-2 ml-1 text-outline">Measured Weight</label>
<div class="grid grid-cols-3 gap-3">
<div class="col-span-2 bg-surface-container-low rounded-2xl px-5 py-3 transition-all duration-200 focus-within:bg-surface-container-lowest focus-within:ring-2 focus-within:ring-primary/40">
<input class="w-full bg-transparent border-none p-0 text-on-surface font-headline text-2xl font-bold placeholder:text-outline/30 focus:ring-0" placeholder="0.00" type="number"/>
</div>
<div class="bg-surface-container-low rounded-2xl px-3 py-3 flex items-center justify-center">
<select class="bg-transparent border-none p-0 text-on-surface font-semibold text-sm focus:ring-0 appearance-none text-center w-full">
<option>grams</option>
<option>oz</option>
<option>kg</option>
</select>
</div>
</div>
</div>
<!-- Date and Time Grid -->
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-xs font-semibold uppercase tracking-wider mb-2 ml-1 text-outline">Date</label>
<div class="bg-surface-container-low rounded-2xl px-5 py-4 flex items-center gap-3 transition-all duration-200 focus-within:bg-surface-container-lowest focus-within:ring-2 focus-within:ring-primary/40">
<span class="material-symbols-outlined text-primary text-xl" data-icon="calendar_today">calendar_today</span>
<input class="w-full bg-transparent border-none p-0 text-on-surface text-sm font-medium focus:ring-0" type="date" value="2023-10-27"/>
</div>
</div>
<div>
<label class="block text-xs font-semibold uppercase tracking-wider mb-2 ml-1 text-outline">Time</label>
<div class="bg-surface-container-low rounded-2xl px-5 py-4 flex items-center gap-3 transition-all duration-200 focus-within:bg-surface-container-lowest focus-within:ring-2 focus-within:ring-primary/40">
<span class="material-symbols-outlined text-primary text-xl" data-icon="schedule">schedule</span>
<input class="w-full bg-transparent border-none p-0 text-on-surface text-sm font-medium focus:ring-0" type="time" value="12:30"/>
</div>
</div>
</div>
<!-- Quick Presets / Selection Chips -->
<div class="pt-2">
<label class="block text-xs font-semibold uppercase tracking-wider mb-3 ml-1 text-outline">Quick Categories</label>
<div class="flex flex-wrap gap-2">
<button class="bg-primary-container text-on-primary-container px-4 py-2 rounded-full text-xs font-bold transition-transform active:scale-95">Breakfast</button>
<button class="bg-surface-container-high text-on-surface-variant px-4 py-2 rounded-full text-xs font-medium hover:bg-surface-variant transition-colors active:scale-95">Lunch</button>
<button class="bg-surface-container-high text-on-surface-variant px-4 py-2 rounded-full text-xs font-medium hover:bg-surface-variant transition-colors active:scale-95">Dinner</button>
<button class="bg-surface-container-high text-on-surface-variant px-4 py-2 rounded-full text-xs font-medium hover:bg-surface-variant transition-colors active:scale-95">Snack</button>
</div>
</div>
<!-- Submit Action -->
<div class="pt-8">
<button class="w-full bg-gradient-to-br from-[#006e1a] to-[#20c93d] text-white py-5 rounded-2xl font-headline text-lg font-bold custom-ambient-shadow transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
          Save Entry
        </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl rounded-t-[1.5rem] shadow-[0_-8px_24px_rgba(26,28,31,0.06)]">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-[#3d4a3c] dark:text-slate-400 opacity-70 hover:bg-green-50 dark:hover:bg-slate-800 transition-colors py-1 px-4 rounded-full" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-inter text-[10px] font-medium tracking-wide">Home</span>
</a>
<!-- History -->
<a class="flex flex-col items-center justify-center text-[#3d4a3c] dark:text-slate-400 opacity-70 hover:bg-green-50 dark:hover:bg-slate-800 transition-colors py-1 px-4 rounded-full" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-inter text-[10px] font-medium tracking-wide">History</span>
</a>
<!-- Center FAB (Scan) -->
<div class="relative -top-6">
<button class="bg-gradient-to-br from-[#006e1a] to-[#20c93d] text-white w-16 h-16 rounded-full shadow-lg flex items-center justify-center transform scale-110 active:scale-100 transition-transform shadow-[0_8px_24px_rgba(0,110,26,0.3)]">
<span class="material-symbols-outlined text-3xl">add_circle</span>
</button>
<span class="absolute -bottom-8 left-1/2 -translate-x-1/2 font-inter text-[10px] font-bold text-primary">Scan</span>
</div>
<!-- Insights -->
<a class="flex flex-col items-center justify-center text-[#3d4a3c] dark:text-slate-400 opacity-70 hover:bg-green-50 dark:hover:bg-slate-800 transition-colors py-1 px-4 rounded-full" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="font-inter text-[10px] font-medium tracking-wide">Insights</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-[#3d4a3c] dark:text-slate-400 opacity-70 hover:bg-green-50 dark:hover:bg-slate-800 transition-colors py-1 px-4 rounded-full" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-inter text-[10px] font-medium tracking-wide">Profile</span>
</a>
</nav>
</body></html>
